<!doctype html>
<html lang="ne">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      श्री कृष्ण द्वैपायन गुरुकुल - गुनासो र सुझाव (Complaints & Feedback)
    </title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
      body {
        font-family: "Noto Serif Devanagari", serif;
      }
      .bg-pattern {
        background-image: radial-gradient(#ff993322 1px, transparent 1px);
        background-size: 24px 24px;
      }
    </style>
  </head>
  <body
    class="bg-[#FFF8E7] text-[#3E1C00] bg-pattern min-h-screen flex flex-col pt-16"
  >
    <!-- Top Navigation -->
    <nav
      class="fixed top-0 left-0 right-0 bg-[#8B0000] text-white shadow-lg z-50 px-4 py-3 flex justify-between items-center border-b-4 border-[#FF9933]"
    >
      <div class="flex items-center gap-3">
        <a
          href="#"
          onclick="goBack()"
          class="hover:bg-white/10 p-1 rounded transition-colors"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
        </a>
        <div
          class="w-10 h-10 bg-[#FF9933] rounded-full flex items-center justify-center border-2 border-[#FFD700] text-[#8B0000] font-bold text-xl"
        >
          ॐ
        </div>
        <h1 class="font-bold text-lg hidden sm:block">
          गुनासो र सुझाव गोश्वारा (Complaints & Feedback)
        </h1>
        <h1 class="font-bold text-lg sm:hidden">गुनासो/सुझाव</h1>
      </div>
      <div class="flex items-center gap-2">
        <span
          id="userRoleBadge"
          class="hidden sm:inline-block px-2 py-1 bg-white/20 rounded text-xs font-bold border border-white/30"
        ></span>
        <button
          onclick="logout()"
          class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded border border-white/30 transition-all text-sm font-medium"
        >
          लगआउट
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-5xl mx-auto w-full p-4 sm:p-6 z-10 relative">
      <div class="flex flex-col lg:flex-row gap-6">
        <!-- Left Side: List of Complaints -->
        <div class="w-full lg:w-2/3 order-2 lg:order-1">
          <div
            class="mb-4 flex justify-between items-end border-b-2 border-[#FFD700]/50 pb-2"
          >
            <h2 class="text-2xl font-bold text-[#8B0000]" id="listTitle">
              हालका दर्ताहरू (Recent Submissions)
            </h2>
          </div>

          <div id="complaintsList" class="space-y-4">
            <div class="py-12 text-center text-lg opacity-60 italic">
              लोड हुँदैछ... (Loading...)
            </div>
          </div>
        </div>

        <!-- Right Side: Submit Form (Visible to Parents mostly, but anyone can submit) -->
        <div class="w-full lg:w-1/3 order-1 lg:order-2">
          <div
            class="bg-white/90 backdrop-blur rounded-2xl shadow-xl border-t-8 border-[#8B0000] overflow-hidden sticky top-24"
          >
            <div
              class="bg-[#FFF8E7] p-4 border-b border-[#FFD700]/30 text-[#8B0000] font-bold text-lg flex items-center gap-2"
            >
              <span>📝</span> नयाँ दर्ता (New Entry)
            </div>
            <form id="complaintForm" class="p-5 space-y-4">
              <div>
                <label class="block text-xs font-bold text-[#8B0000] mb-1"
                  >प्रकार (Type)*</label
                >
                <select
                  id="type"
                  required
                  class="w-full px-3 py-2 rounded-lg border border-[#FFD700]/50 focus:ring-2 focus:ring-[#FF9933] bg-[#FFF8E7]/50 font-bold"
                >
                  <option value="गुनासो (Complaint)">गुनासो (Complaint)</option>
                  <option value="सुझाव (Feedback)">सुझाव (Feedback)</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-bold text-[#8B0000] mb-1"
                  >विषय (Subject)*</label
                >
                <input
                  type="text"
                  id="subject"
                  required
                  class="w-full px-3 py-2 rounded-lg border border-[#FFD700]/50 focus:ring-2 focus:ring-[#FF9933] bg-[#FFF8E7]/50"
                />
              </div>
              <div>
                <label class="block text-xs font-bold text-[#8B0000] mb-1"
                  >विस्तृत विवरण (Details)*</label
                >
                <textarea
                  id="description"
                  rows="5"
                  required
                  class="w-full px-3 py-2 rounded-lg border border-[#FFD700]/50 focus:ring-2 focus:ring-[#FF9933] bg-[#FFF8E7]/50 placeholder:opacity-50"
                  placeholder="Please provide detailed information..."
                ></textarea>
              </div>

              <button
                type="submit"
                id="submitBtn"
                class="w-full bg-[#8B0000] hover:bg-[#a00000] text-white py-3 rounded-lg shadow-lg font-bold border-b-4 border-black/20 transition-all active:scale-95 text-lg mt-2"
              >
                पेस गर्नुहोस् (Submit)
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- Response Modal (For Admins) -->
    <div
      id="responseModal"
      class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border-t-8 border-[#FF9933]"
      >
        <div
          class="bg-[#FFF8E7] p-4 font-bold text-[#8B0000] text-lg flex justify-between items-center border-b border-[#FFD700]/50"
        >
          <h2>प्रतिक्रिया दिनुहोस् (Send Response)</h2>
          <button
            onclick="closeResponseModal()"
            class="text-[#8B0000] hover:text-red-500"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="p-5">
          <input type="hidden" id="modalComplaintId" />
          <div
            class="mb-4 text-sm text-gray-600 bg-gray-50 p-3 rounded"
            id="modalComplaintContext"
          ></div>

          <label class="block text-sm font-bold text-[#8B0000] mb-2"
            >उत्तर / निर्णय (Resolution Note)</label
          >
          <textarea
            id="adminResponse"
            rows="4"
            class="w-full p-3 rounded-lg border border-[#FFD700]/50 focus:ring-2 focus:ring-[#FF9933] bg-[#FFF8E7]/50 mb-4"
            placeholder="Enter administrative response..."
          ></textarea>

          <div class="flex gap-3">
            <button
              onclick="submitResponse()"
              class="flex-1 bg-[#4CAF50] text-white py-2 rounded font-bold hover:bg-green-600 transition-colors shadow"
            >
              समाधान भयो (Mark Resolved)
            </button>
            <button
              onclick="closeResponseModal()"
              class="px-4 py-2 bg-gray-200 text-gray-800 rounded font-bold hover:bg-gray-300 transition-colors"
            >
              रद्द (Cancel)
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div
      id="toast"
      class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-white text-[#3E1C00] px-6 py-4 rounded-xl shadow-2xl border-l-4 border-[#FF9933] font-bold z-[150] flex items-center gap-3"
    >
      <span id="toastMsg">Message</span>
    </div>

    <script>
      const firebaseConfig = {
        projectId: "admin-8f9e1",
        appId: "1:614883937488:web:52f84870e218c9c05722d5",
        apiKey: "AIzaSyAfSc9Lqpg2b3dPWS4ibG88y_bL5LXeoQw",
        authDomain: "admin-8f9e1.firebaseapp.com",
        storageBucket: "admin-8f9e1.firebasestorage.app",
        messagingSenderId: "614883937488",
        measurementId: "",
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
      if (db._databaseId) {
        db._databaseId.database =
          "ai-studio-9d608cb5-2a97-43ab-8728-40f0e479c9d2";
      }

      let currentUserRole = null;
      let currentUserEmail = null;

      auth.onAuthStateChanged((user) => {
        if (!user) {
          window.location.href = "index.html";
          return;
        }
        currentUserEmail = user.email;
        currentUserRole = localStorage.getItem("gurukul_userRole");

        const badge = document.getElementById("userRoleBadge");
        badge.textContent = currentUserRole
          ? currentUserRole.toUpperCase()
          : "USER";
        badge.classList.remove("hidden");

        if (currentUserRole === "admin" || currentUserRole === "teacher") {
          document.getElementById("listTitle").textContent =
            "सबै दर्ताहरू (All Submissions)";
        } else {
          document.getElementById("listTitle").textContent =
            "मेरा दर्ताहरू (My Submissions)";
        }

        loadComplaints();
      });

      function logout() {
        auth.signOut().then(() => (window.location.href = "index.html"));
      }

      function goBack() {
        if (currentUserRole === "parent")
          window.location.href = "parent-portal.html";
        else window.location.href = "parent-portal.html";
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.querySelector("#toastMsg").textContent = msg;
        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          3000,
        );
      }

      async function loadComplaints() {
        const container = document.getElementById("complaintsList");
        try {
          let query = db.collection("complaints").orderBy("createdAt", "desc");

          // If parent, only show their own. Admin/Teacher see all.
          if (currentUserRole === "parent") {
            query = db
              .collection("complaints")
              .where("createdBy", "==", currentUserEmail);
            // No complex ordering for parents to avoid index requirement, doing client-side sort
            const snapshot = await db
              .collection("complaints")
              .where("createdBy", "==", currentUserEmail)
              .get();
            renderComplaints(snapshot.docs, container);
          } else {
            const snapshot = await query.get();
            renderComplaints(snapshot.docs, container);
          }
        } catch (err) {
          console.error(err);
          if (err.message.includes("index")) {
            // client side fallback
            const snap = await db.collection("complaints").get();
            let docs = snap.docs;
            if (currentUserRole === "parent") {
              docs = docs.filter(
                (d) => d.data().createdBy === currentUserEmail,
              );
            }
            docs.sort(
              (a, b) =>
                (b.data().createdAt?.toMillis() || 0) -
                (a.data().createdAt?.toMillis() || 0),
            );
            renderComplaints(docs, container);
          } else {
            container.innerHTML =
              '<div class="text-center text-red-500 font-bold py-8">डाटा लोड गर्न समस्या भयो।</div>';
          }
        }
      }

      function renderComplaints(docs, container) {
        if (docs.length === 0) {
          container.innerHTML =
            '<div class="py-12 bg-white/50 rounded-xl text-center shadow-inner opacity-60">कुनै रेकर्ड फेला परेन। (No records found)</div>';
          return;
        }

        let html = "";
        docs.forEach((doc) => {
          const data = doc.data();
          const isResolved = data.status === "Resolved";

          const statusColor = isResolved
            ? "bg-green-100 text-green-800 border-green-200"
            : "bg-red-100 text-red-800 border-red-200";
          const statusText = isResolved
            ? "समाधान भयो (Resolved)"
            : "निर्णय बाँकी (Pending)";

          // Format Date
          let dateStr = "N/A";
          if (data.createdAt) {
            const d = data.createdAt.toDate();
            dateStr =
              d.toLocaleDateString() +
              " " +
              d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          }

          let actions = "";
          if (
            !isResolved &&
            (currentUserRole === "admin" || currentUserRole === "teacher")
          ) {
            actions = `<button onclick="openResponseModal('${doc.id}', '${data.subject.replace(/'/g, "\\'")}')" class="mt-4 px-4 py-1.5 bg-[#FF9933] text-white text-sm font-bold rounded shadow hover:bg-[#e68a2e] transition-colors">प्रतिक्रिया दिनुहोस् (Resolve & Reply)</button>`;
          }

          let responseHTML = "";
          if (isResolved && data.adminResponse) {
            responseHTML = `
                        <div class="mt-4 p-3 bg-green-50 border-l-4 border-green-500 rounded text-sm text-green-900">
                            <strong>प्रतिक्रिया (Admin Response):</strong><br/>
                            ${data.adminResponse}
                        </div>
                    `;
          }

          html += `
                    <div class="bg-white p-5 rounded-2xl shadow-md border hover:shadow-lg transition-shadow relative">
                        <div class="absolute top-4 right-4 px-2.5 py-1 rounded-full text-xs font-bold border ${statusColor}">
                            ${statusText}
                        </div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-bold px-2 py-0.5 rounded bg-gray-100 text-gray-700 uppercase">${data.type}</span>
                            <span class="text-xs text-gray-500">${dateStr}</span>
                        </div>
                        <h3 class="text-xl font-bold text-[#8B0000] mb-2 pr-28">${data.subject}</h3>
                        <p class="text-[#3E1C00]/80 whitespace-pre-wrap text-sm">${data.description}</p>
                        ${
                          data.createdBy !== currentUserEmail &&
                          (currentUserRole === "admin" ||
                            currentUserRole === "teacher")
                            ? `<div class="text-xs text-gray-400 mt-2">प्रेषक (By): ${data.createdBy}</div>`
                            : ""
                        }
                        
                        ${responseHTML}
                        ${actions}
                    </div>
                `;
        });
        container.innerHTML = html;
      }

      document
        .getElementById("complaintForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("submitBtn");
          btn.disabled = true;
          btn.innerHTML = "पेस हुँदैछ... (Submitting...)";

          try {
            await db.collection("complaints").add({
              type: document.getElementById("type").value,
              subject: document.getElementById("subject").value,
              description: document.getElementById("description").value,
              status: "Pending",
              createdBy: currentUserEmail,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
            showToast("सफलतापूर्वक दर्ता भयो। (Submitted Successfully)");
            document.getElementById("complaintForm").reset();
            loadComplaints();
          } catch (error) {
            console.error("Error adding document: ", error);
            alert("Error: " + error.message);
          } finally {
            btn.disabled = false;
            btn.textContent = "पेस गर्नुहोस् (Submit)";
          }
        });

      // Admin Response logic
      function openResponseModal(id, subject) {
        document.getElementById("modalComplaintId").value = id;
        document.getElementById("modalComplaintContext").textContent =
          "विषय (Subject): " + subject;
        document.getElementById("adminResponse").value = "";
        document.getElementById("responseModal").classList.remove("hidden");
      }

      function closeResponseModal() {
        document.getElementById("responseModal").classList.add("hidden");
      }

      async function submitResponse() {
        const id = document.getElementById("modalComplaintId").value;
        const resText = document.getElementById("adminResponse").value;

        if (!resText.trim()) {
          alert("प्रतिक्रिया खाली हुनुहुँदैन! (Response cannot be empty)");
          return;
        }

        try {
          await db.collection("complaints").doc(id).update({
            status: "Resolved",
            adminResponse: resText,
            resolvedAt: firebase.firestore.FieldValue.serverTimestamp(),
            resolvedBy: currentUserEmail,
          });
          closeResponseModal();
          showToast("प्रतिक्रिया अद्यावधिक भयो। (Response Updated)");
          loadComplaints();
        } catch (e) {
          console.error(e);
          alert("Error: " + e.message);
        }
      }
    </script>
  </body>
</html>
