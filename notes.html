<!doctype html>
<html lang="ne">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>श्री कृष्ण द्वैपायन गुरुकुल - अध्ययन सामग्री (Notes)</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
      body {
        font-family: "Noto Serif Devanagari", serif;
      }
      .bg-pattern {
        background-image: radial-gradient(#ff993322 1px, transparent 1px);
        background-size: 24px 24px;
      }
    </style>
  </head>
  <body
    class="bg-[#FFF8E7] text-[#3E1C00] bg-pattern min-h-screen flex flex-col pt-16"
  >
    <nav
      class="fixed top-0 left-0 right-0 bg-[#8B0000] text-white shadow-lg z-50 px-4 py-3 flex justify-between items-center border-b-4 border-[#FF9933]"
    >
      <div class="flex items-center gap-3">
        <a
          href="parent-portal.html"
          id="backBtn"
          class="hover:bg-white/10 p-1 rounded transition-colors hidden sm:block"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
        </a>
        <div
          class="w-10 h-10 bg-[#FF9933] rounded-full flex items-center justify-center border-2 border-[#FFD700] text-[#8B0000] font-bold text-xl"
        >
          ॐ
        </div>
        <h1 class="font-bold text-lg hidden sm:block">
          अध्ययन सामग्री (PDF Notes)
        </h1>
        <h1 class="font-bold text-lg sm:hidden">नोटहरू</h1>
      </div>
      <div class="flex items-center gap-2">
        <button
          onclick="logout()"
          class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded border border-white/30 transition-all text-sm font-medium"
        >
          लगआउट
        </button>
      </div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto w-full p-4 sm:p-6 z-10 relative">
      <div class="flex flex-col flex-col-reverse md:flex-row gap-6">
        <!-- Left Side: List Notes -->
        <div class="w-full md:w-2/3">
          <div
            class="bg-white/80 backdrop-blur rounded-xl shadow border border-[#FFD700]/30 p-4 mb-4 flex gap-4"
          >
            <select
              id="filterClass"
              class="flex-1 px-3 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 text-sm font-bold"
              onchange="loadNotes()"
            >
              <option value="">सबै कक्षा (All Classes)</option>
              <option value="1">कक्षा १</option>
              <option value="2">कक्षा २</option>
              <option value="3">कक्षा ३</option>
              <option value="4">कक्षा ४</option>
              <option value="5">कक्षा ५</option>
            </select>
            <select
              id="filterSubject"
              class="flex-1 px-3 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 text-sm font-bold"
              onchange="loadNotes()"
            >
              <option value="">सबै विषय (All Subjects)</option>
              <option value="ved">वेद</option>
              <option value="sanskrit">संस्कृत</option>
              <option value="math">गणित</option>
              <option value="nepali">नेपाली</option>
              <option value="english">अंग्रेजी</option>
              <option value="science">विज्ञान</option>
            </select>
          </div>

          <div id="notesGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="col-span-full py-12 text-center opacity-60">
              लोड हुँदैछ...
            </div>
          </div>
        </div>

        <!-- Right Side: Upload Form (Only visible to Admin/Teacher) -->
        <div id="uploadSection" class="w-full md:w-1/3 hidden">
          <div
            class="bg-white rounded-2xl shadow-xl border-t-8 border-[#FF9933] overflow-hidden sticky top-24"
          >
            <div
              class="bg-[#FFF8E7] p-4 border-b border-[#FFD700]/30 text-[#8B0000] font-bold"
            >
              नयाँ सामग्री थप्नुहोस् (Upload Note)
            </div>
            <form id="uploadForm" class="p-5 space-y-4">
              <div>
                <label class="block text-xs font-bold text-[#8B0000] mb-1"
                  >शीर्षक (Title)*</label
                >
                <input
                  type="text"
                  id="noteTitle"
                  required
                  placeholder="e.g. Science Ch-1 PDF"
                  class="w-full px-3 py-2 rounded-lg border border-[#FFD700]/50 focus:ring-2 focus:ring-[#FF9933]"
                />
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-bold text-[#8B0000] mb-1"
                    >कक्षा (Class)*</label
                  >
                  <select
                    id="noteClass"
                    required
                    class="w-full px-3 py-2 rounded-lg border border-[#FFD700]/50"
                  >
                    <option value="" disabled selected>छान्नुहोस्...</option>
                    <option value="1">कक्षा १</option>
                    <option value="2">कक्षा २</option>
                    <option value="3">कक्षा ३</option>
                    <option value="4">कक्षा ४</option>
                    <option value="5">कक्षा ५</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-bold text-[#8B0000] mb-1"
                    >विषय (Subject)*</label
                  >
                  <select
                    id="noteSubject"
                    required
                    class="w-full px-3 py-2 rounded-lg border border-[#FFD700]/50"
                  >
                    <option value="" disabled selected>छान्नुहोस्...</option>
                    <option value="ved">वेद</option>
                    <option value="sanskrit">संस्कृत</option>
                    <option value="math">गणित</option>
                    <option value="nepali">नेपाली</option>
                    <option value="english">अंग्रेजी</option>
                    <option value="science">विज्ञान</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="block text-xs font-bold text-[#8B0000] mb-1"
                  >PDF फाइल (File)*</label
                >
                <input
                  type="file"
                  id="noteFile"
                  accept="application/pdf"
                  required
                  class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#FF9933]/10 file:text-[#FF9933] hover:file:bg-[#FF9933]/20"
                />
              </div>
              <div
                id="uploadProgress"
                class="text-sm font-bold text-[#FF9933] hidden"
              ></div>
              <button
                type="submit"
                id="submitBtn"
                class="w-full bg-[#FF9933] hover:bg-[#e68a2e] text-white py-2.5 rounded-lg shadow font-bold border-b-4 border-[#8B0000]/20 transition-all mt-4"
              >
                अपलोड गर्नुहोस्
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <div
      id="toast"
      class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-white text-[#3E1C00] px-6 py-4 rounded-xl shadow-2xl border-l-4 border-[#FF9933] font-bold z-[150] flex items-center gap-3"
    >
      <span id="toastMsg">Message</span>
    </div>

    <script>
      const firebaseConfig = {
        projectId: "admin-8f9e1",
        appId: "1:614883937488:web:52f84870e218c9c05722d5",
        apiKey: "AIzaSyAfSc9Lqpg2b3dPWS4ibG88y_bL5LXeoQw",
        authDomain: "admin-8f9e1.firebaseapp.com",
        storageBucket: "admin-8f9e1.firebasestorage.app",
        messagingSenderId: "614883937488",
        measurementId: "",
      };

      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
      if (db._databaseId) {
        db._databaseId.database =
          "ai-studio-9d608cb5-2a97-43ab-8728-40f0e479c9d2";
      }
      const storage = firebase.storage();

      let currentUserRole = null;

      auth.onAuthStateChanged((user) => {
        if (!user) {
          window.location.href = "index.html";
          return;
        }
        currentUserRole = localStorage.getItem("gurukul_userRole");

        if (currentUserRole === "parent") {
          document.getElementById("backBtn").href = "parent-portal.html";
          document.getElementById("uploadSection").style.display = "none";
        } else if (currentUserRole === "teacher") {
          document.getElementById("backBtn").style.display = "none";
          document.getElementById("uploadSection").classList.remove("hidden");
        } else {
          // Admin
          document.getElementById("uploadSection").classList.remove("hidden");
        }

        loadNotes();
      });

      function logout() {
        auth.signOut().then(() => (window.location.href = "index.html"));
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.querySelector("#toastMsg").textContent = msg;
        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          3000,
        );
      }

      const subjectNames = {
        ved: "वेद (Veda)",
        sanskrit: "संस्कृत (Sanskrit)",
        math: "गणित (Math)",
        nepali: "नेपाली (Nepali)",
        english: "अंग्रेजी (English)",
        science: "विज्ञान (Science)",
      };

      async function loadNotes() {
        const cls = document.getElementById("filterClass").value;
        const sub = document.getElementById("filterSubject").value;
        const grid = document.getElementById("notesGrid");

        try {
          let query = db.collection("notes");
          if (cls) query = query.where("class", "==", cls);
          if (sub) query = query.where("subject", "==", sub);
          // Ordering by createdAt requires a composite index if combining with where.
          const snapshot = await query.get();

          let notes = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
          // Manual sort by date descending
          notes.sort(
            (a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0),
          );

          if (notes.length === 0) {
            grid.innerHTML =
              '<div class="col-span-full py-12 text-center opacity-60">कुनै सामग्री भेटिएन (No notes found)</div>';
            return;
          }

          let html = "";
          notes.forEach((note) => {
            const date = note.createdAt
              ? new Date(note.createdAt.seconds * 1000).toLocaleDateString()
              : "New";

            let deleteBtn = "";
            if (currentUserRole === "admin" || currentUserRole === "teacher") {
              deleteBtn = `<button onclick="deleteNote('${note.id}')" class="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>`;
            }

            html += `
                        <div class="bg-white rounded-xl shadow border border-gray-100 p-4 relative group hover:border-[#FF9933]/50 transition-colors">
                            <div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                ${deleteBtn}
                            </div>
                            <div class="flex items-start gap-4">
                                <div class="w-12 h-12 bg-red-100 text-red-600 rounded-lg flex items-center justify-center flex-shrink-0">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-bold text-[#3E1C00] truncate" title="${note.title}">${note.title}</h4>
                                    <div class="text-xs text-gray-500 mt-1 flex gap-2 flex-wrap">
                                        <span class="bg-gray-100 px-2 py-0.5 rounded">कक्षा ${note.class}</span>
                                        <span class="bg-[#FFF8E7] px-2 py-0.5 rounded text-[#FF9933] font-medium">${subjectNames[note.subject] || note.subject}</span>
                                    </div>
                                    <div class="text-xs text-gray-400 mt-2">${date} • ${note.uploaderName || "Teacher"}</div>
                                    
                                    <a href="${note.fileUrl}" target="_blank" class="inline-block mt-3 text-sm font-bold text-[#FF9933] hover:underline flex items-center gap-1">
                                        <span>Download / View</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
          });
          grid.innerHTML = html;
        } catch (err) {
          console.error(err);
          grid.innerHTML =
            '<div class="col-span-full py-12 text-center text-red-500">Error loading notes.</div>';
        }
      }

      document
        .getElementById("uploadForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const fileInput = document.getElementById("noteFile");
          const file = fileInput.files[0];
          if (!file) return;

          const btn = document.getElementById("submitBtn");
          const progress = document.getElementById("uploadProgress");

          btn.disabled = true;
          progress.classList.remove("hidden");
          progress.textContent =
            "अपलोड हुँदैछ... कृपया पर्खनुहोस् (Uploading...)";

          try {
            // Upload to Storage
            const storageRef = storage.ref(`notes/${Date.now()}_${file.name}`);
            const snapshot = await storageRef.put(file);
            const url = await snapshot.ref.getDownloadURL();

            // Save to Firestore
            await db.collection("notes").add({
              title: document.getElementById("noteTitle").value,
              class: document.getElementById("noteClass").value,
              subject: document.getElementById("noteSubject").value,
              fileUrl: url,
              fileName: file.name,
              uploaderEmail: auth.currentUser.email,
              uploaderName: auth.currentUser.email.split("@")[0],
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            });

            showToast("सामग्री सफलतापूर्वक अपलोड भयो।");
            document.getElementById("uploadForm").reset();
            loadNotes();
          } catch (err) {
            console.error(err);
            alert("Upload Error: " + err.message);
          } finally {
            btn.disabled = false;
            progress.classList.add("hidden");
          }
        });

      async function deleteNote(id) {
        if (
          confirm(
            "के तपाईं यो सामग्री हटाउन चाहनुहुन्छ? (Are you sure you want to delete this?)",
          )
        ) {
          try {
            await db.collection("notes").doc(id).delete();
            showToast("सामग्री हटाइयो।");
            loadNotes();
          } catch (e) {
            alert("Error: " + e.message);
          }
        }
      }
    </script>
  </body>
</html>
