<!doctype html>
<html lang="ne">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>श्री कृष्ण द्वैपायन गुरुकुल - Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
      body {
        font-family: "Noto Serif Devanagari", serif;
      }
      .spinner {
        display: none;
        width: 22px;
        height: 22px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div
      class="min-h-screen w-full bg-[#FFF8E7] flex flex-col items-center justify-center relative overflow-hidden"
      style="
        background-image: radial-gradient(#ff993311 1px, transparent 1px);
        background-size: 24px 24px;
      "
    >
      <div
        class="absolute inset-0 opacity-[0.03] pointer-events-none flex items-center justify-center"
      >
        <svg width="800" height="800" viewBox="0 0 100 100" fill="#8B0000">
          <path
            d="M50 0C60 20 80 20 100 30C80 40 80 60 100 70C80 80 60 80 50 100C40 80 20 80 0 70C20 60 20 40 0 30C20 20 40 20 50 0Z"
          />
        </svg>
      </div>

      <div class="z-10 text-center mb-8">
        <div
          class="w-24 h-24 bg-[#FF9933] rounded-full flex items-center justify-center shadow-lg border-2 border-[#FFD700] mx-auto mb-4"
        >
          <span class="text-5xl text-[#8B0000] font-bold">ॐ</span>
        </div>
        <h1
          class="text-3xl md:text-4xl text-[#8B0000] font-bold mb-1 tracking-wide"
        >
          श्री कृष्ण द्वैपायन गुरुकुल
        </h1>
        <p
          class="text-[#3E1C00] opacity-80 italic tracking-widest text-xs md:text-sm uppercase"
        >
          Shree Krishna Dwaipayan Gurukul
        </p>
      </div>

      <div
        class="z-10 w-11/12 max-w-[400px] bg-white/80 backdrop-blur-md rounded-2xl shadow-2xl border border-[#FFD700]/30 p-8 relative overflow-hidden"
      >
        <!-- Tab Headers -->
        <div class="flex border-b border-gray-200 mb-6">
          <button
            id="loginTab"
            onclick="switchTab('login')"
            class="flex-1 py-2 font-bold text-[#8B0000] border-b-2 border-[#8B0000]"
          >
            लगइन (Login)
          </button>
          <button
            id="registerTab"
            onclick="switchTab('register')"
            class="flex-1 py-2 font-bold text-gray-400 border-b-2 border-transparent"
          >
            नयाँ खाता (Register)
          </button>
        </div>

        <div
          id="errorMessage"
          class="text-[#8B0000] bg-[#ffe6e6] p-3 rounded-md mb-4 text-sm hidden border-l-4 border-[#8B0000]"
        ></div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
          <div>
            <label class="block text-sm font-bold text-[#3E1C00] mb-1"
              >फोन नम्बर वा इमेल (Phone/Email)</label
            >
            <input
              type="text"
              id="loginPhone"
              required
              class="w-full px-4 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 focus:outline-none focus:ring-2 focus:ring-[#FF9933]"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-[#3E1C00] mb-1"
              >पासवर्ड (Password)</label
            >
            <input
              type="password"
              id="loginPassword"
              required
              class="w-full px-4 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 focus:outline-none focus:ring-2 focus:ring-[#FF9933]"
            />
          </div>
          <button
            type="submit"
            id="loginBtn"
            class="w-full mt-2 bg-[#8B0000] hover:bg-[#6b0000] text-white font-bold py-3 rounded-xl shadow transition-all flex justify-center items-center gap-2"
          >
            <span id="loginBtnText">लगइन गर्नुहोस् (Login)</span>
            <div class="spinner hidden" id="loginSpinner"></div>
          </button>
        </form>

        <!-- Register Form -->
        <form
          id="registerForm"
          class="space-y-4 hidden"
          onsubmit="handleRegister(event)"
        >
          <div>
            <label class="block text-sm font-bold text-[#3E1C00] mb-1"
              >पूरा नाम (Full Name)</label
            >
            <input
              type="text"
              id="regName"
              required
              class="w-full px-4 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 focus:outline-none focus:ring-2 focus:ring-[#FF9933]"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-[#3E1C00] mb-1"
              >फोन नम्बर वा इमेल (Phone/Email)</label
            >
            <input
              type="text"
              id="regPhone"
              required
              class="w-full px-4 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 focus:outline-none focus:ring-2 focus:ring-[#FF9933]"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-[#3E1C00] mb-1"
              >पासवर्ड (Password)</label
            >
            <input
              type="password"
              id="regPassword"
              required
              class="w-full px-4 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 focus:outline-none focus:ring-2 focus:ring-[#FF9933]"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-[#3E1C00] mb-1"
              >भूमिका (Role)</label
            >
            <select
              id="regRole"
              class="w-full px-4 py-2 rounded-lg border border-[#FFD700]/50 bg-[#FFF8E7]/50 focus:outline-none focus:ring-2 focus:ring-[#FF9933]"
            >
              <option value="student">विद्यार्थी (Student)</option>
              <option value="parent">अभिभावक (Parent)</option>
              <option value="teacher">शिक्षक (Teacher) / कर्मचारी</option>
            </select>
          </div>
          <button
            type="submit"
            id="regBtn"
            class="w-full mt-2 bg-[#FF9933] hover:bg-[#e68a2e] text-white font-bold py-3 rounded-xl shadow transition-all flex justify-center items-center gap-2"
          >
            <span id="regBtnText">नयाँ खाता खोल्नुहोस् (Register)</span>
            <div class="spinner hidden" id="regSpinner"></div>
          </button>
        </form>
      </div>

      <div
        class="z-10 mt-12 text-center text-[#3E1C00]/60 text-xs flex flex-col gap-2"
      >
        <div class="flex items-center justify-center gap-4">
          <div class="h-[1px] w-12 bg-[#8B0000]/20"></div>
          <span class="italic font-medium">यतो धर्मस्ततो जयः</span>
          <div class="h-[1px] w-12 bg-[#8B0000]/20"></div>
        </div>
        <p>© २०८० श्री कृष्ण द्वैपायन गुरुकुल | व्यवस्थापन प्रणाली</p>
      </div>

      <div
        class="absolute bottom-[-50px] right-[-50px] opacity-10 pointer-events-none"
      >
        <svg width="300" height="300" viewBox="0 0 100 100" fill="#FF9933">
          <circle
            cx="50"
            cy="50"
            r="40"
            fill="none"
            stroke="currentColor"
            stroke-width="0.5"
            stroke-dasharray="2 2"
          />
          <path d="M50 10 L55 45 L90 50 L55 55 L50 90 L45 55 L10 50 L45 45 Z" />
        </svg>
      </div>
    </div>

    <script>
      // Firebase Configuration
      const firebaseConfig = {
        projectId: "admin-8f9e1",
        appId: "1:614883937488:web:52f84870e218c9c05722d5",
        apiKey: "AIzaSyAfSc9Lqpg2b3dPWS4ibG88y_bL5LXeoQw",
        authDomain: "admin-8f9e1.firebaseapp.com",
        storageBucket: "admin-8f9e1.firebasestorage.app",
        messagingSenderId: "614883937488",
        measurementId: "",
      };

      // Initialize Firebase
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const auth = firebase.auth();
      const db = firebase.firestore();
      if (db._databaseId) {
        db._databaseId.database =
          "ai-studio-9d608cb5-2a97-43ab-8728-40f0e479c9d2";
      }

      // DOM Elements
      const errorMessage = document.getElementById("errorMessage");

      // Switch tabs
      function switchTab(tab) {
        hideError();
        const loginTabBtn = document.getElementById("loginTab");
        const regTabBtn = document.getElementById("registerTab");
        const loginForm = document.getElementById("loginForm");
        const bgForm = document.getElementById("registerForm");

        if (tab === "login") {
          loginTabBtn.className =
            "flex-1 py-2 font-bold text-[#8B0000] border-b-2 border-[#8B0000]";
          regTabBtn.className =
            "flex-1 py-2 font-bold text-gray-400 border-b-2 border-transparent hover:text-gray-600";
          loginForm.classList.remove("hidden");
          bgForm.classList.add("hidden");
        } else {
          regTabBtn.className =
            "flex-1 py-2 font-bold text-[#8B0000] border-b-2 border-[#8B0000]";
          loginTabBtn.className =
            "flex-1 py-2 font-bold text-gray-400 border-b-2 border-transparent hover:text-gray-600";
          bgForm.classList.remove("hidden");
          loginForm.classList.add("hidden");
        }
      }

      function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.style.display = "block";
      }

      function hideError() {
        errorMessage.style.display = "none";
      }

      function setBtnLoading(btnId, textId, spinnerId, isLoading, defaultText) {
        const btn = document.getElementById(btnId);
        const text = document.getElementById(textId);
        const spinner = document.getElementById(spinnerId);

        if (isLoading) {
          text.style.display = "none";
          spinner.style.display = "block";
          btn.style.pointerEvents = "none";
          btn.style.opacity = "0.8";
        } else {
          text.style.display = "block";
          text.textContent = defaultText;
          spinner.style.display = "none";
          btn.style.pointerEvents = "auto";
          btn.style.opacity = "1";
        }
      }

      // Check existing session
      auth.onAuthStateChanged((user) => {
        if (user) {
          const savedRole = localStorage.getItem("gurukul_userRole");
          if (savedRole) {
            redirectByRole(savedRole);
          }
        }
      });

      async function handleLogin(e) {
        e.preventDefault();
        hideError();

        const phoneOrEmail = document.getElementById("loginPhone").value.trim();
        const pwd = document.getElementById("loginPassword").value.trim();

        if (!phoneOrEmail || !pwd) {
          showError(
            "कृपया फोन/इमेल र पासवर्ड भर्नुहोस्। (Please enter Phone/Email and password)",
          );
          return;
        }

        setBtnLoading("loginBtn", "loginBtnText", "loginSpinner", true, "");

        try {
          // First sign in anonymously to ensure firestore reads work
          // even if rules are added later that require auth
          if (!auth.currentUser) {
            await auth.signInAnonymously();
          }

          // query users collection
          const snapshot = await db
            .collection("users")
            .where("phone", "==", phoneOrEmail)
            .where("password", "==", pwd)
            .get();

          if (snapshot.empty) {
            showError(
              "फोन नम्बर/इमेल वा पासवर्ड मिलेन। (Invalid Phone/Email or Password)",
            );
            setBtnLoading(
              "loginBtn",
              "loginBtnText",
              "loginSpinner",
              false,
              "लगइन गर्नुहोस् (Login)",
            );
            return;
          }

          const userData = snapshot.docs[0].data();
          if (userData.role === "admin") {
            showError("एडमिन लगइन यस एपबाट सम्भव छैन। कृपया एडमिन एप प्रयोग गर्नुहोस्। (Admin login not allowed here)");
            setBtnLoading(
              "loginBtn",
              "loginBtnText",
              "loginSpinner",
              false,
              "लगइन गर्नुहोस् (Login)",
            );
            auth.signOut();
            return;
          }
          finishLogin(userData);
        } catch (error) {
          console.error("Login Error: ", error);
          showError(
            "लगइन गर्न सकिएन। (Failed to login: " + error.message + ")",
          );
          setBtnLoading(
            "loginBtn",
            "loginBtnText",
            "loginSpinner",
            false,
            "लगइन गर्नुहोस् (Login)",
          );
        }
      }

      async function handleRegister(e) {
        e.preventDefault();
        hideError();

        const name = document.getElementById("regName").value.trim();
        const phoneOrEmail = document.getElementById("regPhone").value.trim();
        const pwd = document.getElementById("regPassword").value.trim();
        let role = document.getElementById("regRole").value;

        if (!name || !phoneOrEmail || !pwd) {
          showError("विस्तृत विवरण भर्नुहोस्। (Please fill all fields)");
          return;
        }

        setBtnLoading("regBtn", "regBtnText", "regSpinner", true, "");

        try {
          if (!auth.currentUser) {
            await auth.signInAnonymously();
          }

          // Check if phone/email already exists
          const existSnap = await db
            .collection("users")
            .where("phone", "==", phoneOrEmail)
            .get();
          if (!existSnap.empty) {
            showError(
              "यो फोन नम्बर/इमेल पहिला नै दर्ता छ। (Phone/Email already registered)",
            );
            setBtnLoading(
              "regBtn",
              "regBtnText",
              "regSpinner",
              false,
              "नयाँ खाता खोल्नुहोस् (Register)",
            );
            return;
          }

          const newUserReq = {
            name: name,
            phone: phoneOrEmail,
            email: phoneOrEmail.includes("@") ? phoneOrEmail : "", // save as email if looks like one
            password: pwd,
            role: role,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          };

          await db.collection("users").add(newUserReq);
          finishLogin(newUserReq);
        } catch (error) {
          console.error("Registration Error: ", error);
          showError(
            "नयाँ खाता खोल्न सकिएन। (Failed to register: " +
              error.message +
              ")",
          );
          setBtnLoading(
            "regBtn",
            "regBtnText",
            "regSpinner",
            false,
            "नयाँ खाता खोल्नुहोस् (Register)",
          );
        }
      }

      function finishLogin(userData) {
        localStorage.setItem("gurukul_userRole", userData.role);
        localStorage.setItem("gurukul_userName", userData.name);
        localStorage.setItem("gurukul_userPhone", userData.phone);
        redirectByRole(userData.role);
      }

      function redirectByRole(role) {
        window.location.href = "parent-portal.html";
      }
    </script>
  </body>
</html>
